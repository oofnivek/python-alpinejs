<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tic Tac Toe - Toolbox</title>

  <!-- Alpine.js -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <style>
    /* ── Design tokens ─────────────────────────────────────── */
    :root {
      --color-primary:       #6366f1;
      --color-primary-dark:  #4f46e5;
      --color-primary-light: #e0e7ff;
      --color-x:             #f43f5e;
      --color-o:             #0ea5e9;
      --color-gray-50:  #f9fafb;
      --color-gray-100: #f3f4f6;
      --color-gray-200: #e5e7eb;
      --color-gray-300: #d1d5db;
      --color-gray-400: #9ca3af;
      --color-gray-500: #6b7280;
      --color-gray-600: #4b5563;
      --color-gray-700: #374151;
      --color-gray-800: #1f2937;
      --color-gray-900: #111827;
      --radius:    0.5rem;
      --radius-lg: 0.75rem;
      --radius-xl: 1rem;
      --shadow:    0 1px 3px 0 rgb(0 0 0 / 0.1);
      --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
      --font-sans: ui-sans-serif, system-ui, -apple-system, sans-serif;
    }

    /* ── Reset & base ──────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-sans);
      color: var(--color-gray-800);
      background: var(--color-gray-50);
      min-height: 100vh;
    }
    [x-cloak] { display: none !important; }

    /* ── Layout ────────────────────────────────────────────── */
    .app-shell { display: flex; flex-direction: column; min-height: 100vh; }

    .topbar {
      background: white;
      border-bottom: 1px solid var(--color-gray-200);
      padding: 0 1.5rem;
      height: 3.5rem;
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: var(--shadow);
    }
    .topbar-brand {
      display: flex; align-items: center; gap: 0.625rem;
      font-weight: 700; font-size: 1rem; color: var(--color-gray-900);
      text-decoration: none;
    }
    .topbar-brand-icon {
      width: 1.75rem; height: 1.75rem; border-radius: 0.375rem;
      background: var(--color-primary);
      display: flex; align-items: center; justify-content: center;
      color: white; font-size: 0.875rem; font-weight: 800;
    }

    .main { flex: 1; padding: 3rem 1.5rem; max-width: 40rem; margin: 0 auto; width: 100%; }

    /* ── Game Styling ──────────────────────────────────────── */
    .game-header { text-align: center; margin-bottom: 2.5rem; }
    .game-header h1 { font-size: 2rem; font-weight: 800; color: var(--color-gray-900); }
    .game-header p { color: var(--color-gray-500); margin-top: 0.5rem; }

    .status-card {
      background: white;
      padding: 1rem 1.5rem;
      border-radius: var(--radius-lg);
      border: 1px solid var(--color-gray-200);
      margin-bottom: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      box-shadow: var(--shadow);
    }

    .player-indicator {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-weight: 600;
      padding: 0.25rem 0.75rem;
      border-radius: var(--radius);
      transition: all 0.3s;
    }
    .player-indicator.active {
      background: var(--color-primary-light);
      color: var(--color-primary);
      transform: scale(1.05);
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.75rem;
      background: var(--color-gray-200);
      padding: 0.75rem;
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-lg);
      aspect-ratio: 1 / 1;
    }

    .cell {
      background: white;
      border-radius: var(--radius-lg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: 900;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      user-select: none;
    }
    .cell:hover:not(.occupied) {
      background: var(--color-gray-50);
      transform: scale(1.02);
    }
    .cell.occupied { cursor: default; }

    .mark-x { color: var(--color-x); animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    .mark-o { color: var(--color-o); animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

    .winning-cell {
      background: var(--color-primary-light);
      color: var(--color-primary);
    }

    @keyframes pop {
      0% { transform: scale(0); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .controls {
      margin-top: 2.5rem;
      display: flex;
      justify-content: center;
    }

    .btn {
      padding: 0.75rem 2rem;
      border-radius: var(--radius-lg);
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .btn-primary {
      background: var(--color-primary);
      color: white;
    }
    .btn-primary:hover {
      background: var(--color-primary-dark);
      transform: translateY(-2px);
      box-shadow: 0 4px 6px rgba(99, 102, 241, 0.2);
    }

    /* ── Overlay ───────────────────────────────────────────── */
    .win-overlay {
      position: fixed; inset: 0;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
      z-index: 50;
    }
    .win-modal {
      background: white;
      padding: 3rem;
      border-radius: var(--radius-xl);
      text-align: center;
      box-shadow: var(--shadow-lg);
      animation: modal-in 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes modal-in {
      from { transform: scale(0.8); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body x-data="game()" x-init="reset()">
  <div class="app-shell">
    <header class="topbar">
      <a href="/" class="topbar-brand">
        <span class="topbar-brand-icon">T</span>
        Toolbox
      </a>
      <div class="text-sm font-medium text-gray-500">Shared Mouse Multiplayer</div>
    </header>

    <main class="main">
      <div class="game-header">
        <h1>Tic Tac Toe Hotseat</h1>
        <p>Challenge a friend locally on the same screen.</p>
      </div>

      <div class="status-card">
        <div class="player-indicator" :class="currentPlayer === 'X' && !winner && !isDraw ? 'active' : ''">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" style="color:var(--color-x)"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
          Player X
        </div>
        <div class="text-gray-300">|</div>
        <div class="player-indicator" :class="currentPlayer === 'O' && !winner && !isDraw ? 'active' : ''">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" style="color:var(--color-o)"><circle cx="12" cy="12" r="9"></circle></svg>
          Player O
        </div>
      </div>

      <div class="board">
        <template x-for="(cell, index) in board" :key="index">
          <div 
            class="cell" 
            :class="{ 'occupied': cell !== null, 'winning-cell': winningLine.includes(index) }"
            @click="makeMove(index)"
          >
            <template x-if="cell === 'X'">
              <span class="mark-x">✕</span>
            </template>
            <template x-if="cell === 'O'">
              <span class="mark-o">○</span>
            </template>
          </div>
        </template>
      </div>

      <div class="controls">
        <button class="btn btn-primary" @click="reset()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 4v6h-6"></path><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>
          Reset Game
        </button>
      </div>
    </main>

    <!-- Win/Draw Overlay -->
    <div class="win-overlay" x-show="winner || isDraw" x-cloak x-transition.opacity>
      <div class="win-modal">
        <template x-if="winner">
          <div>
            <h2 class="text-2xl font-extrabold mb-2" :style="{ color: winner === 'X' ? 'var(--color-x)' : 'var(--color-o)' }">
              Player <span x-text="winner"></span> Wins!
            </h2>
            <p class="text-gray-500 mb-6">Masterful strategy!</p>
          </div>
        </template>
        <template x-if="isDraw">
          <div>
            <h2 class="text-2xl font-extrabold mb-2 text-gray-700">It's a Draw!</h2>
            <p class="text-gray-500 mb-6">A perfectly balanced match.</p>
          </div>
        </template>
        <button class="btn btn-primary" style="margin: 0 auto;" @click="reset()">Play Again</button>
      </div>
    </div>
  </div>

  <script>
    function game() {
      return {
        board: Array(9).fill(null),
        currentPlayer: 'X',
        winner: null,
        isDraw: false,
        winningLine: [],

        makeMove(index) {
          if (this.board[index] || this.winner || this.isDraw) return;
          
          this.board[index] = this.currentPlayer;
          
          if (this.checkWinner()) {
            this.winner = this.currentPlayer;
          } else if (this.board.every(cell => cell !== null)) {
            this.isDraw = true;
          } else {
            this.currentPlayer = this.currentPlayer === 'X' ? 'O' : 'X';
          }
        },

        checkWinner() {
          const lines = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8], // Rows
            [0, 3, 6], [1, 4, 7], [2, 5, 8], // Cols
            [0, 4, 8], [2, 4, 6]             // Diags
          ];

          for (let line of lines) {
            const [a, b, c] = line;
            if (this.board[a] && this.board[a] === this.board[b] && this.board[a] === this.board[c]) {
              this.winningLine = line;
              return true;
            }
          }
          return false;
        },

        reset() {
          this.board = Array(9).fill(null);
          this.currentPlayer = 'X';
          this.winner = null;
          this.isDraw = false;
          this.winningLine = [];
        }
      }
    }
  </script>
</body>
</html>
